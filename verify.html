<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi - Dark Green System</title>
    <link rel="stylesheet" href="css/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: black;
    color: #00ff00;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOX */
.verify-box {
    border: 1px solid #00ff00;
    padding: 30px;
    width: 300px;
    box-shadow: 0 0 15px #00ff00;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: black;
    border: 1px solid #00ff00;
    color: #00ff00;
    text-align: center;
    letter-spacing: 5px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #00ff00;
    color: #00ff00;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ff00;
    color: black;
}

/* MESSAGE */
.message {
    font-size: 13px;
    margin-bottom: 10px;
    text-align: center;
}

.error {
    color: red;
}

.success {
    color: #00ff00;
}
</style>

</head>
<body>

<div class="verify-box">
    <h2>VERIFIKASI</h2>

    <div id="message" class="message"></div>

    <input type="text" id="code" placeholder="MASUKKAN KODE" maxlength="6">

    <button onclick="verify()">VERIFIKASI</button>
</div>

<script src="js/auth.js"></script>
</body>
</html>

</body>
</html>
