<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Dark Green System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: black;
    color: #00ff00;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    border-right: 1px solid #00ff00;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.menu {
    list-style: none;
}

.menu li {
    margin-bottom: 15px;
    cursor: pointer;
}

.menu li:hover {
    text-shadow: 0 0 5px #00ff00;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    margin-bottom: 20px;
}

/* CONTENT BOX */
.box {
    border: 1px solid #00ff00;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 10px #00ff00;
}

/* BUTTON */
button {
    padding: 10px 20px;
    border: 1px solid #00ff00;
    background: transparent;
    color: #00ff00;
    cursor: pointer;
}

button:hover {
    background: #00ff00;
    color: black;
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MENU</h2>
    <ul class="menu">
        <li onclick="loadPage('home')">🏠 Home</li>
        <li onclick="loadPage('coding')">💻 Coding</li>
        <li onclick="loadPage('computer')">🖥 Komputer</li>
        <li onclick="loadPage('security')">🔐 Security</li>
        <li onclick="loadPage('project')">🧪 Project</li>
        <li onclick="logout()">🚪 Logout</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">
    <div class="header">
        <h1 id="welcome"></h1>
    </div>

    <div id="content" class="box">
        Memuat...
    </div>
</div>

<script>
// CEK LOGIN
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Silakan login terlebih dahulu!");
    window.location.href = "login.html";
}

// TAMPILKAN NAMA
document.getElementById("welcome").textContent = "Welcome, " + user.username;

// LOAD HALAMAN
function loadPage(page) {
    const content = document.getElementById("content");

    if (page === "home") {
        content.innerHTML = `
            <h2>Selamat Datang</h2>
            <p>Ini adalah platform belajar coding dan teknologi.</p>
        `;
    }

    if (page === "coding") {
        content.innerHTML = `
            <h2>Belajar Coding</h2>
            <p>Mulai dari HTML, CSS, JavaScript.</p>
        `;
    }

    if (page === "computer") {
        content.innerHTML = `
            <h2>Cara Kerja Komputer</h2>
            <p>Pelajari CPU, RAM, dan sistem kerja komputer.</p>
        `;
    }

    if (page === "security") {
        content.innerHTML = `
            <h2>Cyber Security</h2>
            <p>Belajar menjaga sistem dari celah keamanan.</p>
        `;
    }

    if (page === "project") {
        content.innerHTML = `
            <h2>Project</h2>
            <p>Buat project coding kamu sendiri.</p>
        `;
    }
}

// DEFAULT PAGE
loadPage("home");

// LOGOUT
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
  </html>
