<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dark Green System</title>
    <link rel="stylesheet" href="css/style.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: black;
    color: #00ff00;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOX LOGIN */
.login-box {
    border: 1px solid #00ff00;
    padding: 30px;
    width: 300px;
    box-shadow: 0 0 15px #00ff00;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: black;
    border: 1px solid #00ff00;
    color: #00ff00;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #00ff00;
    color: #00ff00;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ff00;
    color: black;
}

/* LINK */
.link {
    margin-top: 15px;
    text-align: center;
}

a {
    color: #00ff00;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* ERROR */
.error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>LOGIN SYSTEM</h2>

    <div id="error" class="error"></div>

    <input type="email" id="email" placeholder="Email">
    <input type="text" id="username" placeholder="Username">

    <button onclick="login()">MASUK</button>

    <div class="link">
        Belum punya akun? <a href="register.html">Daftar</a>
    </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
</body>
</html>
